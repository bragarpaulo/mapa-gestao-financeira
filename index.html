<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#0F172A" />
  <title>GPR — Gestão Para Resultado</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%231D4ED8'/><stop offset='1' stop-color='%2316A34A'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M8 22V14M14 22V10M20 22V16' stroke='white' stroke-width='2.4' stroke-linecap='round' fill='none'/><path d='M7 12l6-5 4 3 5-5' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <!-- xlsx/html2canvas/jspdf/jspdf-autotable NÃO entram no boot: carregam sob demanda (js/lazylibs.js) ao Importar/Exportar -->
  <style>
    #boot-loader { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: linear-gradient(135deg, #1D4ED8, #0F172A 72%); color: #fff; font-family: Inter, system-ui, sans-serif; }
    #boot-loader .boot-logo { width: 60px; height: 60px; border-radius: 16px; background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; }
    #boot-loader .boot-spin { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.25); border-top-color: #fff; border-radius: 50%; animation: boot-rot .8s linear infinite; }
    #boot-loader .boot-msg { font-weight: 600; font-size: 14px; opacity: .92; }
    @keyframes boot-rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loader de boot: visível imediatamente (antes do JS) e removido quando o app/login aparece -->
  <div id="boot-loader">
    <div class="boot-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" width="34" height="34"><path d="M4 20V14M10 20V10M16 20V13"/><path d="M3 10l6-5 4 3 6-6"/><path d="M19 2h3v3"/></svg>
    </div>
    <div class="boot-spin"></div>
    <div class="boot-msg">Carregando seus dados…</div>
  </div>
  <div id="layout">
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20V14M10 20V10M16 20V13"/><path d="M3 10l6-5 4 3 6-6"/><path d="M19 2h3v3"/>
          </svg>
        </div>
        <div>
          <div class="brand-title">GPR</div>
          <div class="brand-sub">Gestão Para Resultado</div>
        </div>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-foot">
        <button id="btn-collapse" class="btn btn-ghost sidebar-collapse" title="Recolher menu (só ícones)">« Recolher</button>
        <button id="btn-tema" class="btn btn-ghost sidebar-tema" title="Alternar tema claro/escuro">🌙 Tema escuro</button>
        <button id="btn-limpar" class="btn btn-ghost danger" title="Apaga os dados da empresa atual">🗑 Limpar tudo</button>
        <button id="btn-sair" class="btn btn-ghost" title="Sair da conta">🚪 Sair</button>
      </div>
    </aside>
    <div id="sidebar-overlay"></div>

    <main id="main">
      <header id="topbar">
        <div id="topbar-left">
          <button id="nav-toggle" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div id="empresa-picker"></div>
        </div>
        <div id="topbar-right"></div>
      </header>
      <div id="period-bar"></div>
      <section id="content"></section>
    </main>
  </div>

  <script>
    // Service worker DESATIVADO: era a causa de versões antigas presas no navegador (anônima abria
    // certo, normal não). Não registramos mais nenhum SW e cancelamos qualquer um já instalado +
    // limpamos os caches. Assim o site vem sempre direto da rede e Ctrl+Shift+R pega a versão nova.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister())).catch(() => {});
    }
    if (window.caches) { caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(() => {}); }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
